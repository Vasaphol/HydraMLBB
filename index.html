<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYDRA ROV Draft</title>
    <style>
        :root {
            --blue: #3b82f6; --red: #ef4444; --gold: #fbbf24;
            --slot-height: 80px; 
            --side-width: 260px;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #020617; 
            background-image: url('images/Hydra.png');
            background-repeat: no-repeat;
            background-position: center; 
            background-size: 30%;
            background-attachment: fixed;
            color: #fff;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            overflow: hidden; position: relative;
        }

        @media screen and (min-width: 1024px) { body { background-size: 55%; } }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(2, 6, 23, 0.85); z-index: -1; 
        }

        * { box-sizing: border-box; -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }

       
        .header { 
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; 
            padding: 12px 20px; background: rgba(15, 23, 42, 0.95); 
            border-bottom: 2px solid #1e293b; flex-shrink: 0; 
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        #status { font-size: 20px; font-weight: 900; color: var(--gold); }

        .header-title { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px rgba(59, 130, 246, 0.6); }
        .controls { display: flex; justify-content: flex-end; gap: 8px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-undo { background: #475569; color: white; }
        .btn-reset { background: var(--red); color: white; }

        @keyframes startPulse {
            0%,100% { box-shadow: 0 0 15px rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 35px rgba(34,197,94,0.9); }
        }

       
        .timer-bar {
            display: flex; justify-content: center; align-items: center;
            padding: 8px 20px;
            background: rgba(15, 23, 42, 0.7);
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
        }
        #timerDisplay {
            font-size: 42px; font-weight: 900; letter-spacing: 6px;
            color: #fff;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: color 0.3s;
            min-width: 160px; text-align: center;
            line-height: 1;
        }
        #timerDisplay.warning {
            color: #ef4444;
            text-shadow: 0 0 20px rgba(239,68,68,0.7);
            animation: timerPulse 0.5s infinite;
        }
        #timerDisplay.stopped { color: #475569; text-shadow: none; }

        @keyframes timerPulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        .timer-progress-wrap {
            width: 220px; height: 4px;
            background: #1e293b; border-radius: 2px;
            margin-left: 16px; overflow: hidden;
        }
        #timerBar {
            height: 100%; border-radius: 2px;
            background: var(--gold);
            transition: width 1s linear, background 0.3s;
            width: 100%;
        }

        
        .filter-bar { 
            display: flex; justify-content: center; gap: 8px; 
            padding: 10px; background: rgba(15, 23, 42, 0.5); 
            overflow-x: auto; flex-shrink: 0; 
        }
        .filter-btn { 
            background: #1e293b; color: #94a3b8; border: 1px solid #334155; 
            padding: 6px 15px; border-radius: 20px; cursor: pointer; 
            font-size: 13px; white-space: nowrap; 
        }
        .filter-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        
        .container { display: grid; grid-template-columns: var(--side-width) 1fr var(--side-width); flex: 1; gap: 15px; padding: 15px; overflow: hidden; }

        
        @keyframes borderGlow {
            0% { box-shadow: 0 0 5px var(--gold), inset 0 0 5px var(--gold); border-color: var(--gold); }
            50% { box-shadow: 0 0 20px var(--gold), inset 0 0 10px var(--gold); border-color: #fff; }
            100% { box-shadow: 0 0 5px var(--gold), inset 0 0 5px var(--gold); border-color: var(--gold); }
        }
        .active-slot {
            position: relative; z-index: 10;
            border: 2px solid var(--gold) !important;
            animation: borderGlow 1.5s infinite ease-in-out !important;
        }

       
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideFromLeft { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideFromRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .anim-ban { animation: slideUp 0.4s ease-out forwards; }
        .anim-blue { animation: slideFromLeft 0.4s ease-out forwards; }
        .anim-red { animation: slideFromRight 0.4s ease-out forwards; }

        
        .slot { 
            background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 6px; 
            height: var(--slot-height); margin-bottom: 10px; overflow: hidden; position: relative; 
        }
        .blue .slot { border-left: 5px solid var(--blue); }
        .red .slot { border-right: 5px solid var(--red); }
        
        .slot img { 
            width: 100%; height: 100%; object-fit: cover; object-position: center top;
            position: absolute; top: 0; left: 0; z-index: 1; 
        }
        
        .slot span { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 6px 10px; font-weight: 700; font-size: 14px; text-transform: uppercase; z-index: 2; }
        .red .slot span { text-align: right; }

        .ban-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .ban-slot { width: 48px; height: 48px; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; border-radius: 4px; overflow: hidden; position: relative; }
        .ban-slot img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

        
        .pool-box { background: rgba(15, 23, 42, 0.6); border-radius: 12px; padding: 15px; overflow-y: auto; border: 1px solid #1e293b; backdrop-filter: blur(5px); }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 15px; }
        .hero { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.2s; }
        .hero:hover { transform: scale(1.1); }
        .hero img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #334155; transition: 0.2s; }
        .hero:hover img { border-color: var(--gold); }
        .hero-name { font-size: 11px; text-align: center; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .hero.used { filter: grayscale(1) opacity(0.2); pointer-events: none; }

        
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.93);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 800; gap: 24px;
        }
        .overlay-logo {
            font-size: 42px; font-weight: 900; letter-spacing: 5px;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(251,191,36,0.7);
        }
        .overlay-sub {
            font-size: 15px; letter-spacing: 4px; color: #64748b; text-transform: uppercase;
        }
        .btn-start-big {
            margin-top: 12px;
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            color: #fff; font-size: 20px; font-weight: 900; letter-spacing: 4px;
            padding: 18px 64px; border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 0 40px rgba(34,197,94,0.5), 0 4px 20px rgba(0,0,0,0.4);
            animation: startPulse 1.8s infinite ease-in-out;
            transition: transform 0.15s;
        }
        .btn-start-big:hover { transform: scale(1.05); }
        .btn-start-big:active { transform: scale(0.97); }
        .overlay-hint { font-size: 13px; color: #475569; letter-spacing: 1px; }

        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1e293b; border: 2px solid var(--gold); border-radius: 12px;
            padding: 30px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
            transform: scale(0.8); transition: 0.3s;
        }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-title { font-size: 24px; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .modal-text { color: #cbd5e1; margin-bottom: 25px; line-height: 1.5; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .btn-confirm { background: var(--red); color: white; flex: 1; padding: 12px; }
        .btn-cancel { background: #475569; color: white; flex: 1; padding: 12px; }

        @media screen and (max-height: 450px) and (orientation: landscape) {
            :root { --side-width: 150px; --slot-height: 35px; }
            .hero-grid { grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); }
            .hero img { width: 40px; height: 40px; }
            .ban-slot { width: 28px; height: 28px; }
            .slot span { font-size: 10px; }
            #timerDisplay { font-size: 28px; }
        }
    </style>
</head>

    function folderFor(type) {
        return type === 'ban' ? FOLDER_BAN : FOLDER_PICK;
    }

    function getImgSrc(name, folder) {
        if (imgCache[folder] && imgCache[folder][name]) return imgCache[folder][name];
        return `${folder}/${name}.jpg`; 
    }


    function tryNextExt(imgEl, name, folder, failedExt) {
        const idx = EXTS.indexOf(failedExt);
        if (idx < EXTS.length - 1) {
            const next = EXTS[idx + 1];
            imgEl.onerror = () => tryNextExt(imgEl, name, folder, next);
            imgEl.src = `${folder}/${name}.${next}`;
        } else {
            imgEl.onerror = null;
            imgEl.src = ''; 
        }
    }

    
    function makeImgEl(name, folder, animClass) {
        const img = document.createElement('img');
        img.src = getImgSrc(name, folder);
        img.onerror = () => tryNextExt(img, name, folder, EXTS[0]);
        img.onload  = () => { if (!imgCache[folder]) imgCache[folder] = {}; imgCache[folder][name] = img.src; };
        if (animClass) img.className = animClass;
        return img;
    }

    
    function formatTime(s) {
        return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }

    function updateTimerUI() {
        const el  = document.getElementById('timerDisplay');
        const bar = document.getElementById('timerBar');
        el.textContent = formatTime(timeLeft);
        el.className   = timeLeft <= 10 ? 'warning' : '';
        bar.style.width      = (timeLeft / TIMER_SECONDS * 100) + '%';
        bar.style.background = timeLeft <= 10 ? '#ef4444' : timeLeft <= 20 ? '#f97316' : '#fbbf24';
    }

        document.getElementById('timerDisplay').textContent = '--:--';
        document.getElementById('timerDisplay').className  = 'stopped';
        document.getElementById('timerBar').style.width    = '0%';
    }

    function setTimerFinished() {
        document.getElementById('timerDisplay').textContent = 'END';
        document.getElementById('timerDisplay').className  = 'stopped';
        document.getElementById('timerBar').style.width    = '0%';
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = TIMER_SECONDS;
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) { clearInterval(timerInterval); autoSkip(); }
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); }

    function autoSkip() {
        if (step < draftOrder.length) {
            history.push({ ...draftOrder[step], hero: null, skipped: true });
            step++;
            updateStatus(); renderPool();
            if (step < draftOrder.length) startTimer();
            else { stopTimer(); setTimerFinished(); }
        }
    }

  
    function startDraft() {
        document.getElementById('startOverlay').style.display = 'none';
        draftStarted = true;
        updateStatus();
        startTimer();
    }

    function init() { createSlots(); renderPool(); setTimerStopped(); }

    function createSlots() {
        ['blueBan','redBan'].forEach(id => {
            const el = document.getElementById(id); el.innerHTML = "";
            for (let i = 0; i < BAN_COUNT;  i++) { const d = document.createElement('div'); d.className = 'ban-slot'; el.appendChild(d); }
        });
        ['bluePick','redPick'].forEach(id => {
            const el = document.getElementById(id); el.innerHTML = "";
            for (let i = 0; i < PICK_COUNT; i++) { const d = document.createElement('div'); d.className = 'slot'; el.appendChild(d); }
        });
    }

    function renderPool() {
        const pool = document.getElementById("heroPool"); pool.innerHTML = "";
        heroes.forEach(h => {
            if (currentRole !== 'all' && !h.roles.includes(currentRole)) return;
            const isUsed = history.some(item => item.hero === h.name);
            const div = document.createElement("div");
            div.className = `hero ${isUsed ? 'used' : ''}`;

            const img = makeImgEl(h.name, FOLDER_BAN, '');
            const label = document.createElement('div');
            label.className = 'hero-name';
            label.textContent = h.name;

            div.appendChild(img);
            div.appendChild(label);

            div.onclick = () => {
                if (!draftStarted || step >= draftOrder.length || isUsed) return;
                const data = { ...draftOrder[step], hero: h.name };
                history.push(data);
                addHeroToSlot(data, true);
                step++; updateStatus(); renderPool();
                if (step < draftOrder.length) startTimer();
                else { stopTimer(); setTimerFinished(); }
            };
            pool.appendChild(div);
        });
    }

    function addHeroToSlot(data, isNew) {
        if (!data.hero) return;
        const containerId = `${data.team}${data.type.charAt(0).toUpperCase() + data.type.slice(1)}`;
        const slots = document.getElementById(containerId).children;

        
        const folder = folderFor(data.type);

        for (let slot of slots) {
            if (!slot.querySelector('img')) {
                slot.innerHTML = '';
                const anim = isNew ? (data.type === 'ban' ? 'anim-ban' : (data.team === 'blue' ? 'anim-blue' : 'anim-red')) : '';
                const img = makeImgEl(data.hero, folder, anim);
                slot.appendChild(img);
                if (data.type === 'pick') {
                    const sp = document.createElement('span');
                    if (anim) sp.className = anim;
                    sp.textContent = data.hero;
                    slot.appendChild(sp);
                }
                break;
            }
        }
    }

    function updateStatus() {
        const st = document.getElementById("status");
        document.querySelectorAll('.slot, .ban-slot').forEach(el => el.classList.remove('active-slot'));

        if (step >= draftOrder.length) { st.innerText = "DRAFT FINISHED"; return; }
        if (!draftStarted) { st.innerText = "READY"; return; }

        const cur = draftOrder[step];
        st.innerText = `${cur.team.toUpperCase()} ${cur.type.toUpperCase()}`;

        const containerId = `${cur.team}${cur.type.charAt(0).toUpperCase() + cur.type.slice(1)}`;
        const slots = document.getElementById(containerId).children;
        for (let slot of slots) {
            if (!slot.querySelector('img')) { slot.classList.add('active-slot'); break; }
        }
    }

    function filter(role, btn) {
        currentRole = role;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPool();
    }

    function undo() {
        if (!draftStarted || step <= 0) return;
        history.pop(); step--;
        createSlots();
        history.forEach(data => addHeroToSlot(data, false));
        renderPool(); updateStatus();
        if (step < draftOrder.length) startTimer();
    }

    function openResetModal()  { document.getElementById('resetModal').classList.add('active'); }
    function closeResetModal() { document.getElementById('resetModal').classList.remove('active'); }

    function confirmReset() {
        stopTimer();
        history = []; step = 0; draftStarted = false;
        createSlots(); renderPool();
        document.getElementById('status').innerText = "READY";
        setTimerStopped();
        document.getElementById('startOverlay').style.display = 'flex';
        closeResetModal();
    }

    init();
</script>
</body>
</html>
